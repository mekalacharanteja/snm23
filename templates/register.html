<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.form-container{
    background:white;
    padding:35px;
    border-radius:10px;
    width:300px;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

label{
    font-weight:bold;
}

input{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:#2a5298;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1e3c72;
}

</style>
</head>

<body>
<form action="/register" method="POST">
<div class="form-container">

<h2>Register</h2>

<label>Name</label>
<input type="text" name="username" placeholder="Enter name">

<label>Password</label>
<input type="password" name="userpassword" placeholder="Enter password">

<label>Email</label>
<input type="email" name="useremail" placeholder="Enter email">

<button type="submit">Submit</button>

</div>
</form>

</body>
</html>
